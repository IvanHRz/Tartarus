services:
  beelzebub:
    image: ${BEELZEBUB_IMAGE:-m4r10/beelzebub:latest}
    container_name: tartarus-beelzebub
    restart: unless-stopped
    volumes:
      - ./beelzebub/configurations:/configurations:ro
    environment:
      - RABBITMQ_URI=${RABBITMQ_URI:-amqp://guest:guest@broker:5672/}
      - OPEN_AI_SECRET_KEY=${OPEN_AI_SECRET_KEY:-}
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - tartarus

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: tartarus-engine
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-tartarus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tartarus_dev_2026}
      - POSTGRES_DB=${POSTGRES_DB:-tartarus}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - RABBITMQ_URI=${RABBITMQ_URI:-amqp://guest:guest@broker:5672/}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tartarus

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: tartarus-ui
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - tartarus

  postgres:
    image: postgres:15-alpine
    container_name: tartarus-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tartarus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tartarus_dev_2026}
      - POSTGRES_DB=${POSTGRES_DB:-tartarus}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tartarus -d tartarus"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tartarus

  redis:
    image: redis:7-alpine
    container_name: tartarus-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - tartarus

  broker:
    image: rabbitmq:3-management-alpine
    container_name: tartarus-broker
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    networks:
      - tartarus

  adminer:
    image: adminer:latest
    container_name: tartarus-adminer
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tartarus
    profiles:
      - dev

volumes:
  pg_data:
  redis_data:
  rabbit_data:

networks:
  tartarus:
    driver: bridge
