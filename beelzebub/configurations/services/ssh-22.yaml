apiVersion: "v1"
protocol: "ssh"
address: ":22"
description: "TARTARUS SSH Honeypot — Static Phase 0"
commands:
  - regex: "^ls"
    handler: "Documents  Downloads  Desktop  .ssh  .docker  backup  scripts"
  - regex: "^pwd$"
    handler: "/home/admin"
  - regex: "^whoami$"
    handler: "admin"
  - regex: "^id$"
    handler: "uid=1000(admin) gid=1000(admin) groups=1000(admin),27(sudo)"
  - regex: "^uname"
    handler: "Linux prod-web-01 5.15.0-91-generic #101-Ubuntu SMP x86_64 GNU/Linux"
  - regex: "^cat /etc/passwd"
    handler: "root:x:0:0:root:/root:/bin/bash\nadmin:x:1000:1000::/home/admin:/bin/bash\nwww-data:x:33:33:www-data:/var/www:/usr/sbin/nologin\npostgres:x:110:117:PostgreSQL administrator,,,:/var/lib/postgresql:/bin/bash\nnginx:x:111:118::/var/cache/nginx:/sbin/nologin"
  - regex: "^cat /etc/shadow"
    handler: "cat: /etc/shadow: Permission denied"
  - regex: "^ps"
    handler: "  PID TTY          TIME CMD\n    1 ?        00:00:03 systemd\n  412 ?        00:00:01 nginx\n  518 ?        00:00:12 postgres\n  623 ?        00:00:05 python3\n  891 pts/0    00:00:00 bash"
  - regex: "^netstat|^ss "
    handler: "tcp  LISTEN  0  128  0.0.0.0:22    0.0.0.0:*\ntcp  LISTEN  0  128  0.0.0.0:80    0.0.0.0:*\ntcp  LISTEN  0  128  0.0.0.0:443   0.0.0.0:*\ntcp  LISTEN  0  128  0.0.0.0:5432  0.0.0.0:*"
  - regex: "^docker"
    handler: "Cannot connect to the Docker daemon at unix:///var/run/docker.sock. Is the docker daemon running?"
  - regex: "^curl|^wget"
    handler: "curl: (7) Failed to connect to port 80: Connection refused"
  - regex: "^(.+)$"
    handler: "command not found"
serverVersion: "OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"
serverName: "prod-web-01"
passwordRegex: "^(root|admin|password|123456|qwerty|test|oracle|postgres|ubuntu)$"
deadlineTimeoutSeconds: 120
