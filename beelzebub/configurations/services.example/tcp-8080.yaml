apiVersion: "v1"
protocol: "tcp"
address: ":8080"
description: "TARTARUS TCP Honeypot — Fake internal API"
commands:
  - regex: "^.*$"
    handler: |
      HTTP/1.1 401 Unauthorized
      Server: nginx/1.24.0
      Content-Type: application/json
      WWW-Authenticate: Bearer realm="api.internal"

      {"error":"unauthorized","message":"Valid API token required","docs":"https://docs.internal.gfnorte.mx/api/v2"}
deadlineTimeoutSeconds: 30
