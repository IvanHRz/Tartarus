apiVersion: "v1"
protocol: "http"
address: ":80"
description: "TARTARUS HTTP Honeypot — Static Phase 0"
commands:
  - regex: "^(/|/index.html|/index.php)$"
    handler: |
      <!DOCTYPE html>
      <html>
      <head><title>Portal Interno</title></head>
      <body>
        <h1>Sistema de Gestion Interno</h1>
        <p>Acceso restringido. Contacte al administrador.</p>
        <form action="/login" method="post">
          <input type="text" name="username" placeholder="Usuario">
          <input type="password" name="password" placeholder="Contrasena">
          <button type="submit">Ingresar</button>
        </form>
      </body>
      </html>
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: Apache/2.4.52 (Ubuntu)"
      - "X-Powered-By: PHP/8.1.2"
    statusCode: 200

  - regex: "^/login$"
    handler: |
      <!DOCTYPE html>
      <html>
      <head><title>Error</title></head>
      <body><h1>403 Forbidden</h1><p>Credenciales invalidas.</p></body>
      </html>
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: Apache/2.4.52 (Ubuntu)"
    statusCode: 403

  - regex: "^/wp-admin|^/wp-login"
    handler: |
      <!DOCTYPE html>
      <html>
      <head><title>WordPress - Log In</title></head>
      <body>
        <div id="login">
          <h1><a href="https://wordpress.org/">WordPress</a></h1>
          <form method="post">
            <label>Username or Email Address</label>
            <input type="text" name="log">
            <label>Password</label>
            <input type="password" name="pwd">
            <button type="submit">Log In</button>
          </form>
        </div>
      </body>
      </html>
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: Apache/2.4.52 (Ubuntu)"
      - "X-Powered-By: PHP/8.1.2"
    statusCode: 200

  - regex: "^/robots.txt$"
    handler: |
      User-agent: *
      Disallow: /admin/
      Disallow: /backup/
      Disallow: /config/
    headers:
      - "Content-Type: text/plain"
      - "Server: Apache/2.4.52 (Ubuntu)"
    statusCode: 200

  - regex: "^.*$"
    handler: |
      <!DOCTYPE html>
      <html>
      <head><title>404 Not Found</title></head>
      <body><h1>Not Found</h1><p>The requested URL was not found on this server.</p></body>
      </html>
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: Apache/2.4.52 (Ubuntu)"
    statusCode: 404
