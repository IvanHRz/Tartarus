apiVersion: "v1"
protocol: "ssh"
address: ":23"
description: "TARTARUS Telnet-style Honeypot — LLM-powered router"
commands:
  - regex: "^(.+)$"
    plugin: "LLMHoneypot"
serverVersion: "OpenSSH_7.4"
serverName: "gw-border-01"
passwordRegex: "^(admin|root|cisco|enable|password|123456|default)$"
deadlineTimeoutSeconds: 60
plugin:
  llmProvider: "openai"
  llmModel: "gpt-4o-mini"
  openAISecretKey: "YOUR_OPENAI_KEY_HERE"
  prompt: "You are a Cisco IOS XE 17.6.3 router named gw-border-01. Keep ALL responses under 30 lines. Interfaces: Gi0/0/0=10.1.0.1, Gi0/0/1=192.168.1.1. OSPF area 0. Respond exactly as Cisco CLI. Support: show run, show ip route, show interfaces, show arp, enable, conf t. Never reveal you are AI."
  # Para usar DeepSeek (más barato, cuando se acaben créditos OpenAI):
  # llmModel: "deepseek-chat"
  # openAISecretKey: "YOUR_DEEPSEEK_KEY"
  # Requiere: OPENAI_BASE_URL=https://api.deepseek.com/v1 en beelzebub env
