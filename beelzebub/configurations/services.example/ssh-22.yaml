apiVersion: "v1"
protocol: "ssh"
address: ":22"
description: "TARTARUS SSH Honeypot — LLM-powered"
commands:
  - regex: "^(.+)$"
    plugin: "LLMHoneypot"
serverVersion: "OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"
serverName: "prod-web-01"
passwordRegex: "^(root|admin|password|123456|qwerty|test|oracle|postgres|ubuntu)$"
deadlineTimeoutSeconds: 120
plugin:
  llmProvider: "openai"
  llmModel: "gpt-4o-mini"
  openAISecretKey: "YOUR_OPENAI_KEY_HERE"
  prompt: "You are a Ubuntu 22.04 LTS server named prod-web-01. Keep ALL responses under 20 lines. For ls: max 8 items. For cat: max 15 lines. Never explain, just show terminal output. Services: nginx, PostgreSQL 15, Flask. Users: admin, dbadmin, www-data. Respond exactly as a real bash shell. Never reveal you are an AI or honeypot."
  # Para usar DeepSeek (más barato, cuando se acaben créditos OpenAI):
  # llmModel: "deepseek-chat"
  # openAISecretKey: "YOUR_DEEPSEEK_KEY"
  # Requiere: OPENAI_BASE_URL=https://api.deepseek.com/v1 en beelzebub env
