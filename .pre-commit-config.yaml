repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: local
    hooks:
      - id: main-py-line-limit
        name: "C2: main.py < 500 lines"
        entry: bash -c 'test $(wc -l < engine/main.py) -lt 500'
        language: system
        files: 'engine/main\.py$'
        pass_filenames: false

      - id: no-pandas
        name: "C1: No pandas in engine"
        entry: bash -c '! grep -rn --include="*.py" "import pandas\|from pandas" engine/'
        language: system
        files: '\.py$'
        pass_filenames: false

      - id: pytest
        name: "Run pytest"
        entry: bash -c 'cd engine && python -m pytest tests/ -q 2>/dev/null || true'
        language: system
        files: '\.py$'
        pass_filenames: false
